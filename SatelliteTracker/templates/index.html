<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Satellite Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; background-color: #1e1e1e;}
        #sidebar { width: 320px; background: #2c3e50; color: white; padding: 25px; box-sizing: border-box; box-shadow: 2px 0 5px rgba(0,0,0,0.5); z-index: 1000;}
        #map { flex: 1; }
        .stat-box { background: #34495e; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: inset 0 0 10px rgba(0,0,0,0.2);}
        h2 { margin-top: 0; color: #ecf0f1; border-bottom: 2px solid #7f8c8d; padding-bottom: 10px;}
        .highlight { color: #3498db; font-weight: bold;}
        .visible { color: #2ecc71; font-weight: bold; font-size: 1.1em;}
        .hidden { color: #e74c3c; font-weight: bold; font-size: 1.1em;}

        input[type="text"] { width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px; background: #1e1e1e; color: #3498db; border: 1px solid #7f8c8d; border-radius: 4px; font-weight: bold; font-size: 1em; box-sizing: border-box;}
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Live Telemetry</h2>
        <div class="stat-box">
            <strong>Search Target:</strong><br>
            <input type="text" id="sat-selector" list="sat-list" value="ISS (ZARYA)" placeholder="Type a satellite name...">
            <datalist id="sat-list">
                </datalist>

            <strong>Target:</strong> <span id="official-name" class="highlight">--</span><br>
            <strong>Latitude:</strong> <span id="lat">--</span>&deg;<br>
            <strong>Longitude:</strong> <span id="lng">--</span>&deg;<br>
            <strong>Altitude:</strong> <span id="alt">--</span> km
        </div>

        <h2>Ground Station</h2>
        <div class="stat-box">
            <strong>Observer Location:</strong><br>
            <div style="display: flex; gap: 5px; margin-top: 5px; margin-bottom: 5px;">
                <input type="text" id="city-search" placeholder="e.g. Tokyo, London, Paris..." style="flex: 1;">
                <button id="search-btn" style="background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 0 10px; font-weight: bold;">Search</button>
                <button id="gps-btn" title="Use My Exact Location" style="background: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 0 10px; font-weight: bold;">📍 Find Me</button>
            </div>
            <div style="font-size: 0.85em; color: #bdc3c7; margin-bottom: 15px;">
                Tracking from: <span id="detected-loc" style="color: #f1c40f;">Tel Aviv</span>
            </div>
            
            <strong>Status:</strong> <span id="status" class="hidden">Loading...</span><br><br>
            <strong>Next Pass:</strong> <br><span id="next-pass" style="color: #bdc3c7;">--</span>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Initialize the Map
        var map = L.map('map').setView([0, 0], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Add a marker for the satellite
        var marker = L.marker([0, 0]).addTo(map);

        // Create a glowing dotted line for the orbital path
        var orbitPath = L.polyline([], {
            color: '#e74c3c', // Glowing red
            weight: 3,        // Line thickness
            dashArray: '5, 10', // Makes it a dotted line
            opacity: 0.8
        }).addTo(map);

        // Create a glowing footprint circle
        var footprint = L.circle([0,0], {
            color: '#3498db',     // Blue
            fillColor: '#3498db',
            fillOpacity: 0.15,    // Highly transparent
            weight: 1,            // Thin border
            radius: 0             // Will be calculated dynamically
        }).addTo(map);

        var groundLat = 32.0853
        var groundLon = 34.7818

        // Fetch all satellite names to populate the scrollable list
        fetch('/api/satellites')
            .then(response => response.json())
            .then(names => {
                var dataList = document.getElementById('sat-list');
                names.forEach(function(name){
                    var option = document.createElement('option');
                    option.value = name;
                    dataList.appendChild(option);
                });
            });

        // Fetch Data from API
        // Fetch Data from API
        function fetchTelemetry() {
            var selectedSat = document.getElementById('sat-selector').value;
            if (!selectedSat) return;

            var url = '/api/telemetry?name=' + encodeURIComponent(selectedSat) + '&lat=' + groundLat + '&lon=' + groundLon;
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.error) return;

                    // Update Map
                    var lat = data.latitude;
                    var lon = data.longitude;
                    marker.setLatLng([lat, lon]);

                    if (data.path) {
                        orbitPath.setLatLngs(data.path);
                    }

                    // Calculate and update the footprint circle
                    var earthRadiusKm = 6371.0;
                    var altKm = data.altitude_km;

                    var centralAngle = Math.acos(earthRadiusKm / (earthRadiusKm + altKm));
                    var footprintRadiusKm = earthRadiusKm * centralAngle;

                    footprint.setLatLng([lat, lon]);
                    footprint.setRadius(footprintRadiusKm * 1000); // Leaflet requires meters
                   
                    // Update Sidebar Text
                    document.getElementById('official-name').innerText = data.name;
                    document.getElementById('lat').innerText = lat.toFixed(4);
                    document.getElementById('lng').innerText = lon.toFixed(4);
                    document.getElementById('alt').innerText = data.altitude_km.toFixed(1);

                    var vis = data.visibility;
                    var statusEl = document.getElementById('status');
                    var nextPassEl = document.getElementById('next-pass');

                    if (vis.visible_now) {
                        statusEl.innerText = "VISIBLE IN SKY";
                        statusEl.className = "visible";
                        nextPassEl.innerText = `Elev: ${vis.current_elevation}° | Az: ${vis.current_azimuth}°`;
                    } else {
                        statusEl.innerText = "BLOCKED BY EARTH";
                        statusEl.className = "hidden";
                        // Convert UTC time to local browser time
                        var passDate = new Date(vis.next_pass_utc);
                        nextPassEl.innerText = passDate.toLocaleString();
                    }
                })
                .catch(err => console.error("Error fetching data:", err));
        }

        function searchLocation() {
            var query = document.getElementById('city-search').value;
            if (!query) return;

            var detectedEl = document.getElementById('detected-loc');
            detectedEl.innerText = "Searching...";

            // Call OpenStreetMap's geocoding API
            fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(query))
                .then(response => response.json())
                .then(data => {
                    if (data.length > 0){
                        // Grab the coordinates
                        groundLat = parseFloat(data[0].lat);
                        groundLon = parseFloat(data[0].lon);

                        // Show the city name
                        var shortName = data[0].display_name.split(',')[0];
                        detectedEl.innerText = shortName + " (" + groundLat.toFixed(1) + "°, " + groundLon.toFixed(1) + "°)";

                        fetchTelemetry();
                    }
                    else {
                        detectedEl.innerText = "Location not found";
                    }
                })
                .catch(err => {
                    console.error(err);
                    detectedEl.innerText = "Search failed.";
                });
        }

        //GPS Geolocation feature
        function useGPS() {
            var detectedEl = document.getElementById('detected-city');
            detectedEl.innerText = "Locating you...";

            if (navigator.geolocation) {
                // Ask the browser for coordinates
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        groundLat = position.coords.latitude;
                        groundLon = position.coords.longitude;

                        // Update the sidebar text with exact coordinates
                        detectedEl.innerText = "GPS Location (" + groundLat.toFixed(2) + "°, " + groundLon.toFixed(2) + "°)";
                        
                        // Fetch new satellite passes based on this exact spot
                        fetchTelemetry();
                    },
                    function(error) {
                        console.error("GPS Error:", error);
                        detectedEl.innerText = "GPS Permission Denied.";
                    }
                );
            } 
            else{
                detectedEl.innerText = "GPS not supported by browser.";
            }
        }

        // Attach function to GPS button
        document.getElementById('gps-btn').addEventListener('click', useGPS);

        // Run the search when the user clicks the button
        document.getElementById('search-btn').addEventListener('click', searchLocation);

        // Also run the search if they press "Enter" on their keyboard
        document.getElementById('city-search').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchLocation();
            }
        });

        // Update every 2 seconds)
        setInterval(fetchTelemetry, 2000);
        fetchTelemetry();

        // Instantly update when the user changes the search box
        document.getElementById('sat-selector').addEventListener('change', fetchTelemetry);
    </script>
</body>
</html>
